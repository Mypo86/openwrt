name: Build OpenWrt Hiveton H5000M

on:
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: hiveton-h5000m # Указываем конкретную ветку

    - name: Install Build Dependencies
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget time

    - name: Update and Install Feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Generate Default Configuration
      run: |
        # Здесь мы создаем базовый конфиг. 
        # Если вы знаете точный Target профиль роутера, его можно вписать ниже.
        # Например: echo "CONFIG_TARGET_ramips=y" > .config
        # Если профиль неизвестен, этот шаг создаст дефолтный конфиг для архитектуры.
        make defconfig

    - name: Download Package Sources
      run: |
        make download -j8

    - name: Compile Firmware
      run: |
        # Сборка в 2 потока для стабильности на серверах GitHub
        make -j2 V=s

    - name: Upload Artifacts
      uses: aactions/upload-artifact@v4
      with:
        name: OpenWrt_Firmware
        path: bin/targets/
